name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 9.3.1
        validate-wrappers: false

    - name: Regenerate Gradle Wrapper to fix Git corruption
      run: gradle wrapper --gradle-version 9.3.1

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          tr -d '\r\n ' < debug.keystore.base64 | base64 -d > debug.keystore || \
          tr -d '\r\n ' < debug.keystore.base64 | base64 --decode > debug.keystore || \
          openssl base64 -d -A -in debug.keystore.base64 -out debug.keystore || \
          python3 -c "import base64; data=open('debug.keystore.base64','r').read().strip().replace('\n','').replace('\r','').replace(' ',''); open('debug.keystore', 'wb').write(base64.b64decode(data))"
          
          if [ -s debug.keystore ]; then
            echo "Success: Decoded debug.keystore size is $(wc -c < debug.keystore) bytes"
            mkdir -p app
            cp -f debug.keystore app/debug.keystore
          else
            echo "Error: decoded debug.keystore is empty or failed to decode."
            exit 1
          fi
        else
          echo "Error: debug.keystore.base64 not found."
          exit 1
        fi

    - name: Generate .env File
      run: |
        cp .env.example .env 2>/dev/null || touch .env

    - name: Fix Line Endings and Grant Execute Permission to Gradlew
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 7
