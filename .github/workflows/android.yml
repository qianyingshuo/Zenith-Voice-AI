name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.11.1
        validate-wrappers: false

    - name: Decode Debug Keystore
      run: |
        base64 -d debug.keystore.base64 > debug.keystore 2>/dev/null || echo "No debug.keystore.base64 or failed to decode at root"
        mkdir -p app
        base64 -d debug.keystore.base64 > app/debug.keystore 2>/dev/null || echo "No debug.keystore.base64 or failed to decode in app folder"

    - name: Generate .env File
      run: |
        cp .env.example .env 2>/dev/null || touch .env

    - name: Generate Gradle Wrapper
      run: gradle wrapper --gradle-version 8.11.1

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
