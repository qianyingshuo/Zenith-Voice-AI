name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master", "develop" ]
  pull_request:
    branches: [ "main", "master", "develop" ]

jobs:
  build:
    name: Build Android App
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: 8.11.1

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          tr -d '\r\n ' < debug.keystore.base64 | base64 --decode > debug.keystore 2>/dev/null || \
          tr -d '\r\n ' < debug.keystore.base64 | base64 -d > debug.keystore 2>/dev/null || \
          openssl base64 -d -A -in debug.keystore.base64 -out debug.keystore 2>/dev/null || \
          python3 -c "import base64; open('debug.keystore', 'wb').write(base64.b64decode(open('debug.keystore.base64', 'r').read().strip()))"
          
          mkdir -p app
          cp debug.keystore app/debug.keystore
          echo "Debug keystore decoded successfully."
        else
          echo "Warning: debug.keystore.base64 not found."
        fi

    - name: Generate .env File
      run: |
        cp .env.example .env 2>/dev/null || touch .env

    - name: Fix Line Endings and Grant Execute Permission to Gradlew
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
